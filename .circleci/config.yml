version: 2.1

orbs:
  snyk: snyk/snyk@2.3.0 # https://github.com/snyk/snyk-orb/

jobs:
  build:
    docker:
      # specify the version you desire here
      - image: cimg/openjdk:17.0

      # Specify service dependencies here if necessary
      # CircleCI maintains a library of pre-built images
      # documented at https://circleci.com/docs/2.0/circleci-images/
      # - image: circleci/postgres:9.4

    working_directory: ~/repo

    environment:
      # Customize the JVM maximum heap limit
      JVM_OPTS: -Xmx3200m
      TERM: dumb

    steps:
      - checkout

      # Download and cache dependencies
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "build.gradle" }}
            # fallback to using the latest cache if no exact match is found
            - v1-dependencies-

      - run: ./gradlew dependencies --dependency-verification off

      - save_cache:
          paths:
            - ~/.gradle
          key: v1-dependencies-{{ checksum "build.gradle" }}

      # run tests!
      - run: ./gradlew test -Porg.gradle.dependency.verification.console=verbose --dependency-verification lenient
      - store_test_results:
          path: rd-cli-tool/build/test-results
      - store_test_results:
          path: rd-cli-base/build/test-results
      - store_test_results:
          path: rd-api-client/build/test-results

  snyk_test:
    docker:
      - image: cimg/openjdk:17.0 # this should match what's used in the rest of the project
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: 'Gradle build without running the tests'
          command: './gradlew assemble' # pull in dependencies but do not run tests
      # All Snyk commands below should be identical to any Snyk scan ran using our Snyk orb: https://github.com/PagerDuty/snyk-circleci-orb/blob/main/src/commands/scan.yml
      - snyk/install
      - run: snyk config set org='rundeck-core-mtgfa3XPaKGbFtHj9aRXhg' # this will need to be updated if the project changes owners
      - run:
          name: Run Snyk monitors to track vulnerabilities on main only
          # Run monitor first to push results to webui when on main branch
          command: |
            if [ "$CIRCLE_BRANCH" = "main" ]; then
              snyk monitor --all-projects --detection-depth=10 --scan-all-unmanaged
            else
              echo "Skipping monitor for non-main branch - no data sent to dashboard"
            fi
      - run: snyk test --severity-threshold=high --all-projects --detection-depth=10 --scan-all-unmanaged --json > snyk-results.json || true # will NOT fail step if any results are found
      - run:
          name: CVE Summary
          command: |
            if [ -f snyk-results.json ]; then
              # Check if scan failed (error field present)
              if jq -e '.error' snyk-results.json > /dev/null 2>&1; then
                echo "Snyk scan failed - see snyk-results.json for details"
                exit 0
              fi
              cve_count=$(jq '[.[] | select(type == "object") | select(.vulnerabilities != null) | .vulnerabilities[] | select( (.identifiers.CVE | length > 0 ) or (.identifiers.GHSA | length > 0) or (.identifiers.CWE | length > 0 ) )] | length' snyk-results.json)
              if [ "$cve_count" -gt 0 ]; then
                echo "=== CVEs Found ==="
                jq -r '.[] | select(type == "object") | select(.vulnerabilities != null) | .vulnerabilities[] | select( (.identifiers.CVE | length > 0) or (.identifiers.GHSA | length > 0) or (.identifiers.CWE | length > 0 ) ) | [( [.identifiers.CVE,.identifiers.GHSA,.identifiers.CWE] | map(select(.!=null and .!=[])) | flatten | join(",")), .severity, .moduleName, .title] | @csv' snyk-results.json | sort -u | tee snyk-summary.csv
                echo "=================="
              else
                echo "No CVEs found - clean scan!"
              fi
            else
              echo "No snyk-results.json found — skipping CVE summary"
            fi
      - run:
          name: Convert Snyk results to JUnit XML
          when: always
          command: |
            if [ -f snyk-results.json ]; then
              mkdir -p test-results/junit
              bash scripts/convert_snyk_junit.sh snyk-results.json > test-results/junit/snyk-junit.xml
            fi
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: snyk-results.json
          destination: snyk-results.json
      - store_artifacts:
          path: snyk-summary.csv
          destination: snyk-summary.csv # will NOT fail step if any results are found

workflows:
  version: 2
  test_and_build:
    jobs:
      - snyk_test:
          context:
            - PagerDuty
            - Snyk
      - build
